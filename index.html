<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学术功德木鱼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at center, #12122a 0%, #0a0a1a 70%, #05050f 100%);
    font-family: 'Georgia', 'Noto Serif SC', 'Songti SC', serif;
    overflow: hidden;
    user-select: none;
    position: relative;
  }

  /* subtle grid overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* floating particles background */
  .bg-particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
    animation: floatParticle linear infinite;
  }

  @keyframes floatParticle {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    100% { transform: translateY(-10vh) translateX(calc(var(--dx, 1) * 80px)); opacity: 0; }
  }

  /* ===== Scoreboard ===== */
  #scoreboard {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 100;
    background: rgba(10, 10, 30, 0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 215, 0, 0.25);
    border-radius: 16px;
    padding: 16px 24px;
    color: #ffd700;
    font-family: 'Courier New', 'Noto Sans SC', monospace;
    font-size: 18px;
    font-weight: bold;
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 215, 0, 0.1),
      0 0 20px rgba(255, 215, 0, 0.05);
    letter-spacing: 1px;
    transition: border-color 0.3s, box-shadow 0.3s;
    min-width: 130px;
  }

  #scoreboard .label {
    font-size: 13px;
    color: rgba(255, 215, 0, 0.6);
    font-weight: normal;
    display: block;
    margin-bottom: 2px;
    letter-spacing: 2px;
  }

  #scoreboard .value {
    display: flex;
    align-items: baseline;
    gap: 2px;
  }

  #scoreboard .num {
    font-size: 28px;
    color: #ffd700;
    text-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
    transition: transform 0.1s;
    display: inline-block;
  }

  #scoreboard .num.pop {
    animation: scorePop 0.25s ease;
  }

  @keyframes scorePop {
    0% { transform: scale(1); }
    40% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  /* ===== Fish ===== */
  #fish-container {
    position: relative;
    z-index: 10;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    padding: 30px;
  }

  #fish {
    width: 220px;
    height: 220px;
    display: block;
    animation: breathe 3s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.15));
    transition: filter 0.3s;
    transform-origin: center center;
    will-change: transform;
    position: relative;
    overflow: visible;
  }

  #fish:hover {
    filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.3));
  }

  #fish svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  #fish.bounce {
    animation: clickBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes clickBounce {
    0% { transform: scale(1); }
    25% { transform: scale(0.82); }
    55% { transform: scale(1.12); }
    75% { transform: scale(0.96); }
    100% { transform: scale(1); }
  }

  /* glow ring on click */
  #fish-container::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    border: 3px solid rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), inset 0 0 30px rgba(255, 215, 0, 0.1);
    pointer-events: none;
    opacity: 0;
    transition: none;
  }

  #fish-container.ring::after {
    animation: ringExpand 0.6s ease-out forwards;
  }

  @keyframes ringExpand {
    0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0.8; }
    100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
  }

  /* ===== Floating Text ===== */
  #float-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
  }

  .float-text {
    position: absolute;
    font-family: 'Courier New', 'Noto Sans SC', monospace;
    font-weight: bold;
    font-size: 22px;
    white-space: nowrap;
    pointer-events: none;
    text-shadow: 0 0 10px currentColor, 0 0 30px currentColor;
    will-change: transform, opacity;
    animation: floatUp 1.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  @keyframes floatUp {
    0% {
      opacity: 1;
      transform: translateY(0) translateX(0) scale(0.6);
    }
    15% {
      opacity: 1;
      transform: translateY(-10px) translateX(calc(var(--drift, 0) * 1px)) scale(1);
    }
    100% {
      opacity: 0;
      transform: translateY(-280px) translateX(calc(var(--drift, 0) * 1px)) scale(0.9);
    }
  }

  /* ===== Bottom Zen Text ===== */
  #zen-text {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: rgba(255, 255, 255, 0.12);
    font-size: 14px;
    font-family: 'Courier New', monospace;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
  }

  #zen-text span {
    display: inline-block;
    animation: zenPulse 4s ease-in-out infinite;
  }

  @keyframes zenPulse {
    0%, 100% { opacity: 0.12; }
    50% { opacity: 0.25; }
  }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    #fish { width: 160px; height: 160px; }
    #scoreboard {
      top: 16px;
      left: 16px;
      padding: 12px 16px;
      font-size: 15px;
      min-width: 100px;
    }
    #scoreboard .num { font-size: 22px; }
    .float-text { font-size: 18px; }
  }

  @media (max-width: 400px) {
    #fish { width: 120px; height: 120px; }
    #scoreboard { padding: 10px 14px; font-size: 13px; }
    #scoreboard .num { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="scoreboard">
  <span class="label">✦ 功德值</span>
  <div class="value">
    <span class="num" id="score-num">0</span>
  </div>
</div>

<div id="fish-container">
  <div id="fish">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="40%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#f0a030"/>
          <stop offset="50%" stop-color="#c87820"/>
          <stop offset="100%" stop-color="#8a4e10"/>
        </radialGradient>
        <radialGradient id="bodyShine" cx="35%" cy="30%" r="50%">
          <stop offset="0%" stop-color="rgba(255,230,150,0.4)"/>
          <stop offset="100%" stop-color="rgba(255,230,150,0)"/>
        </radialGradient>
        <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#a06020"/>
          <stop offset="100%" stop-color="#c87820"/>
        </linearGradient>
        <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#c87820"/>
          <stop offset="100%" stop-color="#a06020"/>
        </linearGradient>
      </defs>

      <!-- tail -->
      <path d="M 42 88 Q 28 78 20 82 Q 14 86 20 100 Q 14 114 20 118 Q 28 122 42 112" fill="url(#tailGrad)" stroke="#7a4210" stroke-width="1.5"/>
      <path d="M 38 92 Q 26 86 24 100 Q 26 114 38 108" fill="none" stroke="#9a5a18" stroke-width="1" opacity="0.5"/>

      <!-- body -->
      <ellipse cx="105" cy="100" rx="58" ry="50" fill="url(#bodyGrad)" stroke="#7a4210" stroke-width="2"/>

      <!-- head -->
      <path d="M 150 70 Q 168 72 174 85 Q 178 95 174 105 Q 168 118 150 120 Q 158 110 158 100 Q 158 90 150 70" fill="url(#headGrad)" stroke="#7a4210" stroke-width="1.5"/>
      <!-- mouth -->
      <path d="M 173 86 Q 176 92 174 98" fill="none" stroke="#5a3008" stroke-width="2" stroke-linecap="round"/>
      <!-- eye -->
      <circle cx="158" cy="82" r="5" fill="none" stroke="#5a3008" stroke-width="1.8"/>
      <circle cx="158" cy="82" r="2" fill="#5a3008"/>
      <circle cx="157" cy="81" r="0.8" fill="#fff" opacity="0.6"/>

      <!-- scales row 1 -->
      <path d="M 72 78 Q 82 70 92 78" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 90 76 Q 100 68 110 76" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 108 74 Q 118 66 128 74" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 126 76 Q 136 68 146 76" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>

      <!-- scales row 2 -->
      <path d="M 64 92 Q 74 84 84 92" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 82 90 Q 92 82 102 90" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 100 88 Q 110 80 120 88" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 118 90 Q 128 82 138 90" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>

      <!-- scales row 3 -->
      <path d="M 68 106 Q 78 98 88 106" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 86 104 Q 96 96 106 104" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 104 102 Q 114 94 124 102" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 122 104 Q 132 96 142 104" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>

      <!-- scales row 4 -->
      <path d="M 72 120 Q 82 112 92 120" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 90 118 Q 100 110 110 118" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>
      <path d="M 108 120 Q 118 112 128 120" fill="none" stroke="#9a5a18" stroke-width="1.2" opacity="0.6"/>

      <!-- body shine -->
      <ellipse cx="105" cy="100" rx="58" ry="50" fill="url(#bodyShine)"/>

      <!-- decorative bands -->
      <path d="M 55 88 Q 62 75 78 66" fill="none" stroke="#d4a040" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
      <path d="M 145 126 Q 135 133 120 138" fill="none" stroke="#d4a040" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div id="float-container"></div>

<div id="zen-text"><span>⋮ 敲 一 敲  ·  攒 功 德 ⋮</span></div>

<script>
(function() {
  'use strict';

  const fish = document.getElementById('fish');
  const container = document.getElementById('fish-container');
  const floatContainer = document.getElementById('float-container');
  const scoreNum = document.getElementById('score-num');

  let score = 0;
  let isAnimating = false;

  // ===== Sound =====
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playKnock() {
    try {
      initAudio();
      // Short noise burst (attack)
      const noiseLen = 0.06;
      const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * noiseLen, audioCtx.sampleRate);
      const noiseData = noiseBuf.getChannelData(0);
      for (let i = 0; i < noiseData.length; i++) {
        noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.015));
      }
      const noiseSrc = audioCtx.createBufferSource();
      noiseSrc.buffer = noiseBuf;

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + noiseLen);

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1200;
      filter.Q.value = 0.8;

      noiseSrc.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noiseSrc.start();

      // Low thud (body resonance)
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(280, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.08);

      const oscGain = audioCtx.createGain();
      oscGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
      oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.12);
    } catch(e) {
      // Audio not available, silently ignore
    }
  }

  const messages = [
    { text: '功德 +1',       color: '#ffd700' },
    { text: 'Bug -1',        color: '#ff6b6b' },
    { text: '头发 +1',       color: '#00ff88' },
    { text: '论文通过率 +99%', color: '#00ccff' },
    { text: 'Accept +1',     color: '#b388ff' },
    { text: 'Deadline -1天',  color: '#ff9f43' },
    { text: '导师微笑 +1',   color: '#ff80ab' },
  ];

  function getRandomMessage() {
    return messages[Math.floor(Math.random() * messages.length)];
  }

  function updateScore() {
    score++;
    scoreNum.textContent = score;
    scoreNum.classList.remove('pop');
    void scoreNum.offsetWidth;
    scoreNum.classList.add('pop');
  }

  function spawnFloatText() {
    const msg = getRandomMessage();
    const el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = msg.text;
    el.style.color = msg.color;

    const rect = container.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const top = rect.top;

    const drift = (Math.random() - 0.5) * 160;
    el.style.setProperty('--drift', drift);
    el.style.left = `${cx + Math.random() * 40 - 20}px`;
    el.style.top = `${top}px`;
    el.style.transform = 'translateX(-50%)';
    el.style.fontSize = `${20 + Math.random() * 8}px`;

    floatContainer.appendChild(el);

    el.addEventListener('animationend', () => {
      el.remove();
    });
  }

  function handleClick(e) {
    if (isAnimating) return;
    isAnimating = true;

    playKnock();

    fish.classList.remove('bounce');
    void fish.offsetWidth;
    fish.classList.add('bounce');

    container.classList.remove('ring');
    void container.offsetWidth;
    container.classList.add('ring');

    updateScore();

    spawnFloatText();
    if (Math.random() < 0.3) {
      setTimeout(spawnFloatText, 80);
    }

    const onEnd = () => {
      fish.classList.remove('bounce');
      container.classList.remove('ring');
      isAnimating = false;
      fish.removeEventListener('animationend', onEnd);
    };
    fish.addEventListener('animationend', onEnd);
  }

  fish.addEventListener('click', handleClick);
  fish.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleClick(e);
  }, { passive: false });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !e.repeat) {
      e.preventDefault();
      handleClick(e);
    }
  });

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'bg-particle';
    const size = 2 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = ['#ffd700', '#00ffff', '#b388ff', '#00ff88'][Math.floor(Math.random() * 4)];
    p.style.setProperty('--dx', (Math.random() - 0.5) * 2);
    p.style.animationDuration = (15 + Math.random() * 20) + 's';
    p.style.animationDelay = (Math.random() * 25) + 's';
    document.body.appendChild(p);
  }
})();
</script>

</body>
</html>
